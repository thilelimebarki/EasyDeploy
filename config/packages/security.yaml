security:
    # Encodage des mots de passe
    password_hashers:
        App\Entity\Technicien:
            algorithm: auto

    # Chargement des utilisateurs depuis la base de données
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Technicien
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginFormAuthenticator
            logout:
                path: app_logout

    # Contrôle d'accès aux pages
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\Technicien:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
